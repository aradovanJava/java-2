<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dodaj korisnika</title>
    <link rel="stylesheet" th:href="@{/css/stil.css}" href="../../css/stil.css">
</head>
<body>
<header class="traka">
    <span class="logo">Servleti primjer</span>
    <nav>
        <a th:href="@{/pocetna}" href="#">Početna</a>
        <a th:href="@{/korisnici}" href="#">Korisnici</a>
        <a th:href="@{/predstavi-se}" href="#">Predstavi se</a>
        <a th:href="@{/admin/pregled}" href="#">Administracija</a>
    </nav>
</header>

<main>
    <p class="kicker">Obrazac · POST</p>
    <h1>Dodaj korisnika</h1>

    <div class="kartica">
        <p class="greska" th:if="${greska}" th:text="${greska}">poruka o grešci</p>

        <!-- doPost obrađuje slanje, zatim radi redirect na /korisnici (PRG) -->
        <form th:action="@{/korisnici/dodaj}" method="post" action="#">
            <div>
                <label for="ime">Ime *</label>
                <input type="text" id="ime" name="ime" th:value="${ime}" placeholder="Ime i prezime">
            </div>
            <div>
                <label for="email">E-mail *</label>
                <input type="email" id="email" name="email" th:value="${email}" placeholder="ime@example.com">
            </div>
            <div>
                <label for="grad">Grad</label>
                <input type="text" id="grad" name="grad" th:value="${grad}" placeholder="npr. Zagreb">
            </div>
            <div style="display:flex; gap:0.6rem;">
                <button type="submit" class="gumb">Spremi</button>
                <a th:href="@{/korisnici}" href="#" class="gumb sekundarni">Odustani</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
